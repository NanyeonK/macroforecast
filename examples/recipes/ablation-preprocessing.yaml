# Example: ablation study that toggles one component at a time.
#
# The baseline is a simple rolling Ridge regression on FRED-MD INDPRO with
# three components worth studying — the scaling policy, the feature-builder
# choice, and the model family. Running execute_ablation over this baseline
# yields 1 + 3 = 4 artifacts plus an ablation_report.json summarising how
# each component shifts the primary metric.
#
# Usage (Python):
#   from macrocast import AblationSpec, execute_ablation
#   import yaml
#   baseline = yaml.safe_load(open("examples/recipes/ablation-preprocessing.yaml"))
#   spec = AblationSpec(
#       baseline_recipe_dict=baseline,
#       components_to_ablate=(
#           ("path.3_training.fixed_axes.model_family", "lasso"),
#           ("path.3_training.fixed_axes.benchmark_family", "historical_mean"),
#       ),
#   )
#   result = execute_ablation(spec=spec, output_root="out/ablation-demo")

recipe_id: ablation-preprocessing-baseline
path:
  0_meta:
    fixed_axes:
      research_design: single_forecast_run
  1_data_task:
    fixed_axes:
      dataset: fred_md
      info_set: revised
      target_structure: single_target_point_forecast
    leaf_config:
      target: INDPRO
      horizons: [1]
  2_preprocessing:
    fixed_axes:
      target_transform_policy: raw_level
      x_transform_policy: raw_level
      tcode_policy: raw_only
      target_missing_policy: none
      x_missing_policy: none
      target_outlier_policy: none
      x_outlier_policy: none
      scaling_policy: none
      dimensionality_reduction_policy: none
      feature_selection_policy: none
      preprocess_order: none
      preprocess_fit_scope: not_applicable
      inverse_transform_policy: none
      evaluation_scale: raw_level
  3_training:
    fixed_axes:
      framework: rolling
      benchmark_family: zero_change
      feature_builder: raw_feature_panel
      model_family: ridge
  4_evaluation:
    fixed_axes:
      primary_metric: msfe
  5_output_provenance:
    leaf_config:
      manifest_mode: full
      benchmark_config:
        minimum_train_size: 5
        rolling_window_size: 5
  6_stat_tests:
    fixed_axes:
      stat_test: none
  7_importance:
    fixed_axes:
      importance_method: minimal_importance
