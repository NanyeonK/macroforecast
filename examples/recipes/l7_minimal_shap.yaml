7_interpretation:
  enabled: true
  nodes:
    - id: src_xgb
      type: source
      selector: {layer_ref: l4, sink_name: l4_model_artifacts_v1, subset: {model_id: xgb_full}}
    - id: src_X
      type: source
      selector: {layer_ref: l3, sink_name: l3_features_v1, subset: {component: X_final}}
    - id: shap
      type: step
      op: shap_tree
      params: {model_family: xgboost, check_additivity: true, approximate: false}
      inputs: [src_xgb, src_X]
  sinks:
    l7_importance_v1:
      global: shap
  fixed_axes:
    output_table_format: long
    figure_type: auto
    top_k_features_to_show: 20
    precision_digits: 4
    figure_format: pdf
    latex_table_export: true
