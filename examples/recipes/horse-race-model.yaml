recipe_id: horse-race-model
path:
  0_meta:
    fixed_axes:
      experiment_unit: single_target_generator_grid
  1_data_task:
    fixed_axes:
      dataset: fred_md
      information_set_type: final_revised_data
      target_structure: single_target
    leaf_config:
      target: INDPRO
      horizons: [1, 3]
  2_preprocessing:
    fixed_axes:
      target_transform_policy: raw_level
      x_transform_policy: raw_level
      tcode_policy: raw_only
      target_missing_policy: none
      x_missing_policy: none
      target_outlier_policy: none
      x_outlier_policy: none
      scaling_policy: none
      dimensionality_reduction_policy: none
      feature_selection_policy: none
      preprocess_order: none
      preprocess_fit_scope: not_applicable
      inverse_transform_policy: none
      evaluation_scale: raw_level
  3_training:
    fixed_axes:
      framework: rolling
      benchmark_family: zero_change
      feature_builder: raw_feature_panel
    sweep_axes:
      model_family: [ridge, lasso, elasticnet, bayesian_ridge]
  4_evaluation:
    fixed_axes:
      primary_metric: msfe
  5_output_provenance:
    leaf_config:
      manifest_mode: full
      benchmark_config:
        minimum_train_size: 5
        rolling_window_size: 5
  6_stat_tests:
    fixed_axes: {}
  7_importance:
    fixed_axes:
      importance_method: minimal_importance
