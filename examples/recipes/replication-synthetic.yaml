# Example: replication-ready recipe for the synthetic round-trip demo.
#
# The recipe is intentionally conservative — raw-level target, no
# preprocessing, seeded_reproducible mode — so execute_replication can
# be driven over the same recipe with overrides={} and reproduce the
# source run byte-for-byte.
#
# Usage (Python):
#   from macrocast import execute_replication
#   import yaml
#   recipe = yaml.safe_load(open("examples/recipes/replication-synthetic.yaml"))
#   # First, run the recipe once to produce a source artifact:
#   # ... (see docs/examples/synthetic_replication_roundtrip.md)
#   result = execute_replication(
#       source_recipe_dict=recipe,
#       overrides={},
#       source_artifact_dir="out/src-run",
#       output_root="out/replay",
#       provenance_payload={
#           "compiler": {"reproducibility_spec": {
#               "reproducibility_mode": "seeded_reproducible", "seed": 42,
#           }}
#       },
#   )
#   assert result.byte_identical_predictions

recipe_id: replication-synthetic-src
path:
  0_meta:
    fixed_axes:
      research_design: single_forecast_run
  1_data_task:
    fixed_axes:
      dataset: fred_md
      info_set: revised
      target_structure: single_target_point_forecast
    leaf_config:
      target: INDPRO
      horizons: [1]
  2_preprocessing:
    fixed_axes:
      target_transform_policy: raw_level
      x_transform_policy: raw_level
      tcode_policy: raw_only
      target_missing_policy: none
      x_missing_policy: none
      target_outlier_policy: none
      x_outlier_policy: none
      scaling_policy: none
      dimensionality_reduction_policy: none
      feature_selection_policy: none
      preprocess_order: none
      preprocess_fit_scope: not_applicable
      inverse_transform_policy: none
      evaluation_scale: raw_level
  3_training:
    fixed_axes:
      framework: rolling
      benchmark_family: zero_change
      feature_builder: raw_feature_panel
      model_family: ridge
  4_evaluation:
    fixed_axes:
      primary_metric: msfe
  5_output_provenance:
    leaf_config:
      manifest_mode: full
      benchmark_config:
        minimum_train_size: 5
        rolling_window_size: 5
  6_stat_tests:
    fixed_axes:
      stat_test: none
  7_importance:
    fixed_axes:
      importance_method: minimal_importance
