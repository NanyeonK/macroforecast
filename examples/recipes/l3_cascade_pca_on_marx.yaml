3_feature_engineering:
  nodes:
    - id: src_x
      type: source
      selector: {layer_ref: l2, sink_name: l2_clean_panel_v1, subset: {role: predictors}}
    - id: src_y
      type: source
      selector: {layer_ref: l2, sink_name: l2_clean_panel_v1, subset: {role: target}}
    - id: marx
      type: step
      op: ma_increasing_order
      params: {max_order: 12}
      pipeline_id: marx
      inputs: [src_x]
    - id: pca_on_marx
      type: step
      op: pca
      params: {n_components: 6, temporal_rule: expanding_window_per_origin}
      inputs:
        - id: marx_ref
          type: source
          selector: {layer_ref: l3, sink_name: pipeline_output, subset: {pipeline_id: marx}}
    - id: lag_pca_marx
      type: step
      op: lag
      params: {n_lag: 4}
      inputs: [pca_on_marx]
    - id: y_h
      type: step
      op: target_construction
      params: {mode: cumulative_average, method: direct, horizon: 6}
      inputs: [src_y]
  sinks:
    l3_features_v1: {X_final: lag_pca_marx, y_final: y_h}
    l3_metadata_v1: auto
