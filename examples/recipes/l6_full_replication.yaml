# Full L6 test battery (DM/CW/GR/MCS/PT/residual). Three L4 models
# (AR(1) benchmark + ridge + gradient_boosting) against an NBER-regime
# data block; end-to-end runnable on a 36-row synthetic panel.
#
# To swap in xgboost / lightgbm / catboost change ``fit_xgb.params.family``
# and install the corresponding macroforecast extra.
0_meta:
  fixed_axes: {failure_policy: fail_fast, reproducibility_mode: seeded_reproducible}
  leaf_config: {random_seed: 42}
1_data:
  fixed_axes: {custom_source_policy: custom_panel_only, frequency: monthly, horizon_set: custom_list, regime_definition: none}
  leaf_config:
    target: y
    target_horizons: [1]
    custom_panel_inline:
      date: [2018-01-01, 2018-02-01, 2018-03-01, 2018-04-01, 2018-05-01, 2018-06-01, 2018-07-01, 2018-08-01, 2018-09-01, 2018-10-01, 2018-11-01, 2018-12-01, 2019-01-01, 2019-02-01, 2019-03-01, 2019-04-01, 2019-05-01, 2019-06-01, 2019-07-01, 2019-08-01, 2019-09-01, 2019-10-01, 2019-11-01, 2019-12-01, 2020-01-01, 2020-02-01, 2020-03-01, 2020-04-01, 2020-05-01, 2020-06-01, 2020-07-01, 2020-08-01, 2020-09-01, 2020-10-01, 2020-11-01, 2020-12-01]
      y:  [1.0, 2.1, 3.0, 3.8, 5.2, 6.1, 6.9, 8.1, 9.0, 10.2, 11.0, 11.9, 13.1, 14.0, 14.8, 16.2, 17.0, 17.9, 19.1, 20.0, 20.8, 22.2, 23.0, 23.9, 25.1, 26.0, 26.8, 28.2, 29.0, 29.9, 31.1, 32.0, 32.8, 34.2, 35.0, 35.9]
      x1: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0, 5.5, 6.0, 6.5, 7.0, 7.5, 8.0, 8.5, 9.0, 9.5, 10.0, 10.5, 11.0, 11.5, 12.0, 12.5, 13.0, 13.5, 14.0, 14.5, 15.0, 15.5, 16.0, 16.5, 17.0, 17.5, 18.0]
2_preprocessing:
  fixed_axes: {transform_policy: no_transform, outlier_policy: none, imputation_policy: none_propagate, frame_edge_policy: keep_unbalanced}
3_feature_engineering:
  nodes:
    - {id: src_X, type: source, selector: {layer_ref: l2, sink_name: l2_clean_panel_v1, subset: {role: predictors}}}
    - {id: src_y, type: source, selector: {layer_ref: l2, sink_name: l2_clean_panel_v1, subset: {role: target}}}
    - {id: lag_x, type: step, op: lag, params: {n_lag: 1}, inputs: [src_X]}
    - {id: y_h, type: step, op: target_construction, params: {mode: point_forecast, method: direct, horizon: 1}, inputs: [src_y]}
  sinks:
    l3_features_v1: {X_final: lag_x, y_final: y_h}
    l3_metadata_v1: auto
4_forecasting_model:
  nodes:
    - {id: src_X, type: source, selector: {layer_ref: l3, sink_name: l3_features_v1, subset: {component: X_final}}}
    - {id: src_y, type: source, selector: {layer_ref: l3, sink_name: l3_features_v1, subset: {component: y_final}}}
    - {id: fit_ar1, type: step, op: fit_model, params: {family: ar_p, n_lag: 1, forecast_strategy: direct, training_start_rule: expanding, refit_policy: every_origin, search_algorithm: none, min_train_size: 12}, is_benchmark: true, inputs: [src_y]}
    - {id: predict_ar1, type: step, op: predict, inputs: [fit_ar1]}
    - {id: fit_ridge, type: step, op: fit_model, params: {family: ridge, alpha: 1.0, forecast_strategy: direct, training_start_rule: expanding, refit_policy: every_origin, search_algorithm: none, min_train_size: 12}, inputs: [src_X, src_y]}
    - {id: predict_ridge, type: step, op: predict, inputs: [fit_ridge, src_X]}
    - {id: fit_xgb, type: step, op: fit_model, params: {family: gradient_boosting, n_estimators: 50, max_depth: 3, learning_rate: 0.1, forecast_strategy: direct, training_start_rule: expanding, refit_policy: every_origin, search_algorithm: none, min_train_size: 12}, inputs: [src_X, src_y]}
    - {id: predict_xgb, type: step, op: predict, inputs: [fit_xgb, src_X]}
  forecast_object: point
  sinks:
    l4_forecasts_v1: predict_ridge
    l4_model_artifacts_v1: fit_ridge
    l4_training_metadata_v1: auto
5_evaluation:
  fixed_axes: {}
6_statistical_tests:
  enabled: true
  test_scope: per_target_horizon
  dependence_correction: newey_west
  overlap_handling: nw_with_h_minus_1_lag
  sub_layers:
    L6_A_equal_predictive:
      enabled: true
      fixed_axes:
        equal_predictive_test: multi
        loss_function: squared
        model_pair_strategy: vs_benchmark_only
        hln_correction: true
    L6_B_nested:
      enabled: true
      fixed_axes:
        nested_test: multi
        nested_pair_strategy: vs_benchmark_auto
        cw_adjustment: true
        enc_test_one_sided: one_sided
    L6_C_cpa:
      enabled: true
      fixed_axes:
        cpa_test: giacomini_rossi_2010
        cpa_window_type: rolling_window
        cpa_conditioning_info: lagged_loss_difference
        cpa_critical_value_method: simulated
    L6_D_multiple_model:
      enabled: true
      fixed_axes:
        multiple_model_test: multi
        mcs_alpha: 0.10
        stepm_alpha: 0.10
        mmt_loss_function: squared
        bootstrap_method: stationary_bootstrap
        bootstrap_n_replications: 1000
        mcs_t_statistic: t_max
        spa_studentization: consistent
    L6_F_direction:
      enabled: true
      fixed_axes:
        direction_test: pesaran_timmermann_1992
        direction_threshold: zero
        direction_alpha: 0.05
    L6_G_residual:
      enabled: true
      fixed_axes:
        residual_test: [ljung_box_q, arch_lm, jarque_bera_normality, breusch_godfrey_serial_correlation]
        residual_lag_count: 10
        residual_test_scope: per_model_target_horizon
        residual_alpha: 0.05
  leaf_config:
    nw_lag_truncation: auto
    cpa_rolling_window_size: 12
    bootstrap_block_length: auto
