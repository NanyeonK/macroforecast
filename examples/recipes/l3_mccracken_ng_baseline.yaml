3_feature_engineering:
  nodes:
    - id: src_x
      type: source
      selector: {layer_ref: l2, sink_name: l2_clean_panel_v1, subset: {role: predictors}}
    - id: src_y
      type: source
      selector: {layer_ref: l2, sink_name: l2_clean_panel_v1, subset: {role: target}}
    - id: pca8
      type: step
      op: pca
      params: {n_components: 8, temporal_rule: expanding_window_per_origin, whiten: false}
      pipeline_id: F
      inputs: [src_x]
    - id: lag_pca
      type: step
      op: lag
      params: {n_lag: 4, include_contemporaneous: true}
      inputs: [pca8]
    - id: lag_y_for_x
      type: step
      op: lag
      params: {n_lag: 4, include_contemporaneous: false}
      inputs: [src_y]
    - id: combined_x
      type: combine
      op: concat
      params: {axis: column}
      inputs: [lag_pca, lag_y_for_x]
    - id: y_cum
      type: step
      op: target_construction
      params: {mode: cumulative_average, method: direct, horizon: {sweep: [1, 3, 6, 12]}}
      inputs: [src_y]
  sinks:
    l3_features_v1: {X_final: combined_x, y_final: y_cum}
    l3_metadata_v1: auto
