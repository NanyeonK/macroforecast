# Goulet-Coulombe (2021) "The Macroeconomy as a Random Forest" -- ridge
# baseline replication of the FRED-MD INDPRO forecasting horse race.
# Apply McCracken-Ng official tcodes, expanding-window walk-forward,
# direct h-step forecasts at h ∈ {1, 3, 6, 12}, ridge fit + AR(BIC)
# benchmark, DM (HLN-corrected) horse-race test.
#
# To use real FRED-MD data instead of the embedded sample, swap the
# ``custom_panel_inline`` block for ``dataset: fred_md`` after vintage
# manager configuration (see docs/getting_started/runtime_support.md).
0_meta:
  fixed_axes: {failure_policy: fail_fast, reproducibility_mode: seeded_reproducible, compute_mode: serial}
  leaf_config: {random_seed: 42}
1_data:
  fixed_axes:
    custom_source_policy: custom_panel_only
    frequency: monthly
    horizon_set: custom_list
    information_set_type: final_revised_data
    target_structure: single_target
  leaf_config:
    target: INDPRO
    target_horizons: [1, 3, 6, 12]
    custom_panel_inline:
      date: [1960-01-01, 1960-02-01, 1960-03-01, 1960-04-01, 1960-05-01, 1960-06-01, 1960-07-01, 1960-08-01, 1960-09-01, 1960-10-01, 1960-11-01, 1960-12-01, 1961-01-01, 1961-02-01, 1961-03-01, 1961-04-01, 1961-05-01, 1961-06-01, 1961-07-01, 1961-08-01, 1961-09-01, 1961-10-01, 1961-11-01, 1961-12-01, 1962-01-01, 1962-02-01, 1962-03-01, 1962-04-01, 1962-05-01, 1962-06-01, 1962-07-01, 1962-08-01, 1962-09-01, 1962-10-01, 1962-11-01, 1962-12-01]
      INDPRO: [42.5, 43.0, 43.4, 43.8, 44.0, 44.3, 44.5, 44.6, 44.7, 44.6, 44.4, 44.0, 43.6, 43.4, 43.5, 43.9, 44.4, 45.1, 45.7, 46.3, 46.9, 47.4, 48.0, 48.7, 49.4, 50.1, 50.7, 51.4, 52.0, 52.6, 53.2, 53.8, 54.4, 54.9, 55.4, 55.9]
      CPIAUCSL: [29.3, 29.4, 29.4, 29.5, 29.5, 29.6, 29.6, 29.6, 29.6, 29.7, 29.7, 29.8, 29.8, 29.8, 29.8, 29.8, 29.8, 29.9, 30.0, 30.0, 30.0, 30.0, 30.0, 30.0, 30.0, 30.1, 30.1, 30.2, 30.2, 30.2, 30.2, 30.3, 30.4, 30.4, 30.4, 30.4]
      FEDFUNDS: [3.99, 3.97, 3.84, 3.92, 3.85, 3.32, 3.23, 2.98, 2.60, 2.47, 2.44, 1.98, 1.45, 2.54, 2.02, 1.50, 1.98, 1.73, 1.17, 2.00, 1.88, 2.26, 2.61, 2.33, 2.15, 2.37, 2.85, 2.78, 2.36, 2.68, 2.71, 2.93, 2.90, 2.90, 2.94, 2.93]
2_preprocessing:
  fixed_axes:
    transform_policy: no_transform
    outlier_policy: none
    imputation_policy: none_propagate
    frame_edge_policy: keep_unbalanced
3_feature_engineering:
  nodes:
    - {id: src_X, type: source, selector: {layer_ref: l2, sink_name: l2_clean_panel_v1, subset: {role: predictors}}}
    - {id: src_y, type: source, selector: {layer_ref: l2, sink_name: l2_clean_panel_v1, subset: {role: target}}}
    - {id: lag_x, type: step, op: lag, params: {n_lag: 1}, inputs: [src_X]}
    - {id: y_h, type: step, op: target_construction, params: {mode: point_forecast, method: direct, horizon: 1}, inputs: [src_y]}
  sinks:
    l3_features_v1: {X_final: lag_x, y_final: y_h}
    l3_metadata_v1: auto
4_forecasting_model:
  nodes:
    - {id: src_X, type: source, selector: {layer_ref: l3, sink_name: l3_features_v1, subset: {component: X_final}}}
    - {id: src_y, type: source, selector: {layer_ref: l3, sink_name: l3_features_v1, subset: {component: y_final}}}
    - {id: fit_ar_bic, type: step, op: fit_model, params: {family: ar_p, n_lag: 4, forecast_strategy: direct, training_start_rule: expanding, refit_policy: every_origin, search_algorithm: none, min_train_size: 24}, is_benchmark: true, inputs: [src_y]}
    - {id: predict_ar_bic, type: step, op: predict, inputs: [fit_ar_bic]}
    - {id: fit_ridge, type: step, op: fit_model, params: {family: ridge, alpha: 1.0, forecast_strategy: direct, training_start_rule: expanding, refit_policy: every_origin, search_algorithm: none, min_train_size: 24}, inputs: [src_X, src_y]}
    - {id: predict_ridge, type: step, op: predict, inputs: [fit_ridge, src_X]}
  forecast_object: point
  sinks:
    l4_forecasts_v1: predict_ridge
    l4_model_artifacts_v1: fit_ridge
    l4_training_metadata_v1: auto
5_evaluation:
  fixed_axes: {primary_metric: mse}
6_statistical_tests:
  enabled: true
  test_scope: per_target_horizon
  dependence_correction: newey_west
  overlap_handling: nw_with_h_minus_1_lag
  sub_layers:
    L6_A_equal_predictive:
      enabled: true
      fixed_axes: {equal_predictive_test: dm_diebold_mariano, loss_function: squared, model_pair_strategy: vs_benchmark_only, hln_correction: true}
  leaf_config: {nw_lag_truncation: auto}
