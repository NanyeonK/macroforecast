site_name: macrocast
site_description: Decomposing ML Forecast Gains in Macroeconomic Forecasting
site_author: Chan
docs_dir: docs
repo_url: https://github.com/macrocast/macrocast
repo_name: macrocast/macrocast
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Data Layer:
    - Overview: data/index.md
    - FRED-MD: data/fred-md.md
    - FRED-QD: data/fred-qd.md
    - FRED-SD: data/fred-sd.md
    - MacroFrame: data/macroframe.md
    - Vintage Management: data/vintages.md
  - Pipeline Layer:
    - Overview: pipeline/index.md
    - Components: pipeline/components.md
    - Feature Construction: pipeline/features.md
    - Model Zoo: pipeline/models.md
    - ForecastExperiment: pipeline/experiment.md
    - Results: pipeline/results.md
  - Evaluation Layer:
    - Overview: evaluation/index.md
    - Metrics: evaluation/metrics.md
    - Decomposition: evaluation/decomposition.md
    - Model Confidence Set: evaluation/mcs.md
    - Diebold-Mariano Test: evaluation/dm.md
    - Clark-West Test: evaluation/cw.md
    - Giacomini-White Test: evaluation/gw.md
    - Regime-Conditional: evaluation/regime.md
  - Preprocessing:
    - Overview: preprocessing/index.md
    - Transformations: data/transforms.md
    - Missing Values: data/missing.md
  - Interpretation:
    - Overview: interpretation/index.md
    - Dual Weights: evaluation/dual.md
    - PBSV: evaluation/pbsv.md
  - Visualization:
    - Overview: viz/index.md
  - Replication:
    - Overview: replication/index.md
    - CLSS 2021: replication/clss2021.md
  - Tutorials:
    - CLSS 2021 Replication: tutorials/clss2021-replication.md
  - Research:
    - Coulombe Methodology: research/coulombe-methodology.md
  - API Reference:
    - Overview: api/index.md
    - macrocast.data: api/data.md
    - macrocast.preprocessing: api/preprocessing.md
    - macrocast.pipeline: api/pipeline.md
    - macrocast.evaluation: api/evaluation.md
    - macrocast.interpretation: api/interpretation.md
    - macrocast.viz: api/viz.md
    - macrocast.utils: api/utils.md
  - Design: DESIGN.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/macrocast/macrocast
