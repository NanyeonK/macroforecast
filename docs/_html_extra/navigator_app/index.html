<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>macroforecast Navigator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">mf</div>
          <div>
            <div class="brand-title">macroforecast Navigator</div>
            <div class="brand-subtitle">Broad Multi-Target FRED-MD</div>
          </div>
        </div>
        <div class="topbar-center">
          <label class="recipe-label" for="recipeName">Recipe</label>
          <input id="recipeName" class="recipe-input" />
          <span id="validationBadge" class="status-badge">valid</span>
        </div>
        <div class="topbar-actions">
          <button id="resetBtn" class="icon-button" title="Reset to defaults">Reset</button>
          <button id="exportBtn" class="primary-button" title="Download YAML">Export YAML</button>
        </div>
      </header>

      <aside class="layer-rail">
        <div class="rail-section-label">Layers</div>
        <div id="layerRail" class="layer-list"></div>
      </aside>

      <main class="workspace">
        <section class="workspace-header">
          <div>
            <div id="workspaceEyebrow" class="eyebrow">Layer</div>
            <h1 id="workspaceTitle">Layer Map</h1>
          </div>
          <div id="workspaceActions" class="workspace-actions"></div>
        </section>
        <section id="workspaceBody" class="workspace-body"></section>
      </main>

      <aside class="inspector">
        <div class="panel-title">Inspector</div>
        <div id="inspectorBody" class="inspector-body"></div>
      </aside>

      <section class="bottom-panel">
        <div class="tabs">
          <button class="tab active" data-tab="yaml">YAML</button>
          <button class="tab" data-tab="validation">Validation</button>
          <button class="tab" data-tab="contract">Contract</button>
          <button class="tab" data-tab="run">Run Command</button>
        </div>
        <div id="bottomBody" class="bottom-body"></div>
      </section>
    </div>
    <script src="app.js"></script>
  </body>
</html>
