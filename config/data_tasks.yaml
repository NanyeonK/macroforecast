data_tasks:
  - id: __default__
    applicable_datasets: [fred_md, fred_qd, fred_sd]
    defaults:
      sample_period:
        start: null
        end: null
      estimation_start: null
      oos_period:
        start: null
        end: null
      minimum_train_size: 120
      validation_design: last_block
      outer_window: expanding
      refit_policy: every_oos_step
      horizon_grid_default: [1]
    notes: Fallback task defaults for package-level forecasting runs

  - id: fred_md_default
    applicable_datasets: [fred_md]
    defaults:
      sample_period:
        start: '1960-01-01'
        end: null
