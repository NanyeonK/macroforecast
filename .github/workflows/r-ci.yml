name: R CI

on:
  push:
    branches: ["main", "master"]
    paths:
      - "macrocastR/**"
      - ".github/workflows/r-ci.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "macrocastR/**"
      - ".github/workflows/r-ci.yml"

jobs:
  r-check:
    name: R CMD check (${{ matrix.r-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r-version: ["4.3", "4.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up R ${{ matrix.r-version }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: macrocastR
          extra-packages: |
            any::rcmdcheck
            any::devtools
            any::testthat
            any::withr

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: macrocastR
          args: 'c("--no-manual", "--no-vignettes")'
          # roxygen2 man/ pages not yet generated in v0.1.0 — full docs in v0.2.0
          error-on: '"never"'

  r-test:
    name: testthat
    runs-on: ubuntu-latest
    needs: r-check

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libarrow-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: macrocastR
          extra-packages: |
            any::devtools
            any::testthat
            any::withr

      - name: Run testthat
        run: |
          Rscript -e "devtools::test('macrocastR', reporter = 'progress', stop_on_failure = TRUE)"
