name: release

# PyPI publish via API token (PYPI_API_TOKEN secret in repo settings).
# Triggers on tag push `v*.*.*`.
#
# NOTE: the project maintainer owns the ``macroforecast`` PyPI namespace,
# so a successful tag push publishes the new version to
# https://pypi.org/project/macroforecast/. v0.6.0 was the first release
# under this namespace (the v0.5.x history was published under the old
# ``macrocast`` GitHub repo and never reached PyPI; v0.5.x tags remain
# in this repo's history under the original name).
#
# Required: the ``PYPI_API_TOKEN`` secret must be registered in repo
# Settings → Secrets and variables → Actions, scoped to the
# ``macroforecast`` PyPI project.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: |
          python -m build

      - name: Check distribution
        run: |
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
