name: release

# PyPI publish via API token (PYPI_API_TOKEN secret in repo settings).
# Triggers on tag push `v*.*.*`.
#
# NOTE: this workflow only publishes successfully when (a) the
# ``PYPI_API_TOKEN`` secret is registered, and (b) the token has upload
# permission for the ``macroforecast`` PyPI project. The PyPI ``macroforecast``
# namespace is currently held by an unrelated 2017 package
# (``macroforecast 0.0.2`` by Amir Sani); until ownership / a rename is
# resolved, ``pip install macroforecast`` will not pull this project.
# README + docs/install.md therefore recommend GitHub-tag installation
# (``pip install "git+https://github.com/NanyeonK/macroforecast.git@<tag>"``)
# as the supported installation path.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: |
          python -m build

      - name: Check distribution
        run: |
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
