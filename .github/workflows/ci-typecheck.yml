name: ci-typecheck

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-typecheck.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'macroforecast/**/*.py'
  pull_request:
    paths:
      - '.github/workflows/ci-typecheck.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'macroforecast/**/*.py'
  workflow_dispatch:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install typecheck dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[typecheck]"

      - name: Run mypy baseline
        run: |
          mypy
