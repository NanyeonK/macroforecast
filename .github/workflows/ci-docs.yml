name: ci-docs

# Sphinx docs build verification.
# Runs when docs/** or conf.py changes.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'docs/**'
      - 'pyproject.toml'

jobs:
  sphinx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build Sphinx HTML (fail on warning)
        run: |
          sphinx-build -W -b html docs docs/_build/html

      - name: Check no xref_missing beyond suppressed
        run: |
          ! sphinx-build -b linkcheck docs docs/_build/linkcheck 2>&1 | grep -E 'broken:' || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html/
          retention-days: 7
