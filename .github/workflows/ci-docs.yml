name: ci-docs

# Sphinx docs build verification and GitHub Pages deployment.
# Pull requests verify docs. Pushes to main also publish docs to gh-pages.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-docs.yml'
      - 'docs/**'
      - 'tools/docgen/**'
      - 'pyproject.toml'
      - 'macroforecast/**'  # autodoc reads docstrings from the package
  pull_request:
    paths:
      - '.github/workflows/ci-docs.yml'
      - 'docs/**'
      - 'tools/docgen/**'
      - 'pyproject.toml'
      - 'macroforecast/**'

permissions:
  contents: read

jobs:
  sphinx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Reference docs drift check
        run: |
          # The reference tree is source-committed but generated from the live
          # public API, model registry, signatures, and docstrings. Fail if the
          # committed pages no longer match the installed package.
          python -m tools.docgen --check docs/reference

      - name: Model overview drift check
        run: |
          # The models-and-features page is source-committed but generated from
          # the package (mf.list_model_specs() plus the *_step builders). Fail if
          # the committed pages no longer match the installed package.
          python tools/gen_model_overview.py --check docs/guide

      - name: Model policy matrix drift check
        run: |
          # The model x forecast-policy matrix is generated from the package
          # registry and direct-policy guard. Fail if the committed page drifts.
          python tools/gen_policy_matrix.py --check docs/guide

      - name: Build Sphinx HTML (fail on warning)
        run: |
          sphinx-build -W -b html docs docs/_build/html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docs-html
          path: docs/_build/html/
          retention-days: 7

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: sphinx
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download docs artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: docs-html
          path: docs-html

      - name: Deploy docs to gh-pages
        run: |
          set -euo pipefail

          git fetch origin gh-pages

          deploy_dir="$(mktemp -d)"
          git worktree add -B gh-pages "$deploy_dir" origin/gh-pages

          find "$deploy_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R docs-html/. "$deploy_dir"/
          touch "$deploy_dir/.nojekyll"

          cd "$deploy_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No docs changes to deploy."
            exit 0
          fi

          git commit -m "Deploy docs from ${GITHUB_SHA}"
          git push origin gh-pages
