name: ci-core

# Core test matrix — no [deep] extra. Phase 0 deliverable; fills in with real steps.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (core, no deep)
        run: |
          pytest tests/ -x -q -m 'not deep'

      - name: Check seed hardcoding absent (Phase 0)
        run: |
          # seed_policy.py documents the anti-pattern in its docstring and
          # __pycache__ contains compiled bytecode copies of that docstring;
          # exclude both from the grep.
          ! grep -rE 'random_state=42|random_seed=42' macroforecast/execution/ --include='*.py' --exclude='seed_policy.py' || (echo "Found hardcoded seed — use resolve_seed()" && exit 1)

      - name: Check version consistency (pyproject.toml ↔ macroforecast/__init__.py)
        run: |
          python - <<'PY'
          import re, pathlib, sys
          v1 = re.search(r'^version = "([^"]+)"', pathlib.Path("pyproject.toml").read_text(), re.M).group(1)
          v2 = re.search(r'^__version__ = "([^"]+)"', pathlib.Path("macroforecast/__init__.py").read_text(), re.M).group(1)
          if v1 != v2:
              sys.exit(f"version mismatch: pyproject={v1!r}, __init__={v2!r}")
          print(f"version OK: {v1}")
          PY

      - name: Check docs do not advertise stale tag
        run: |
          # README and install docs must point at the current package version.
          # CHANGELOG entries naming older tags are fine; they are historical.
          version=$(python -c 'import re,pathlib; print(re.search(r"^version = \"([^\"]+)\"", pathlib.Path("pyproject.toml").read_text(), re.M).group(1))')
          if grep -RnE "@v[0-9]+\.[0-9]+\.[0-9]+" README.md docs/install.md | grep -v "@v${version}" ; then
              echo "Stale @vN.N.N tag in README.md / docs/install.md — bump to v${version}"
              exit 1
          fi
          if grep -nE "version-[0-9]+\.[0-9]+\.[0-9]+" README.md | grep -v "version-${version}" ; then
              echo "Stale version-N.N.N badge in README.md — bump to version-${version}"
              exit 1
          fi
          echo "docs install tag matches package version (v${version})"

      - name: Check no stale audience-tree references in live docs
        run: |
          # The v0.6.2 docs reorg replaced these audience trees with the
          # 4-audience structure (for_researchers / for_recipe_authors /
          # for_contributors / reference) plus architecture/ and replications/.
          # Any live (non-_archive) doc that still links to a removed tree
          # path is a dangling link from the migration.
          live_docs=$(find docs -name '*.md' -type f -not -path 'docs/_archive/*')
          if echo "$live_docs" | xargs grep -lE '\((\.\./)*(getting_started|user_guide|fred_dataset|simple|detail|api|dev)/' 2>/dev/null ; then
              echo "Stale audience-tree reference left over from v0.6.2 docs reorg"
              echo "(getting_started/, user_guide/, fred_dataset/, simple/, detail/, api/, dev/ no longer exist in live docs)"
              exit 1
          fi
          echo "no stale audience-tree references"
