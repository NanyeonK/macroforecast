[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "macroforecast"
version = "0.9.0a0"
description = "Fair, reproducible macro forecasting benchmarking package"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "pandas>=2.2",
    "numpy>=2.0",
    "scikit-learn>=1.5",
    "statsmodels>=0.14",
    "PyYAML>=6.0",
    "scipy>=1.11",
    "matplotlib>=3.7",
    "openpyxl>=3.1",
    "cvxpy>=1.4",
]

[project.optional-dependencies]
tuning = ["optuna>=3.0"]
shap = ["shap>=0.47"]
lime = ["lime>=0.2"]
xgboost = ["xgboost>=3.0,<3.1"]
lightgbm = ["lightgbm>=4.0"]
catboost = ["catboost>=1.2"]
parquet = ["pyarrow>=14.0"]
deep = ["torch>=2.0"]
mars = ["pyearth>=0.1"]
# Phase C M9 (2026-05-08): GARCH(1,1) / EGARCH / Realized-GARCH families
# wrap the ``arch`` package. Kept optional (not promoted to top-level
# ``dependencies``) so users not using vol forecasting do not pay an
# import-time cost. Mirrors the xgboost / lightgbm / catboost / deep
# pattern -- the L4 fit raises ``NotImplementedError`` with an install
# hint when ``arch`` is missing.
arch = ["arch>=6.0"]
anatomy = ["anatomy"]
docs = [
    "sphinx>=7.0",
    "sphinx-rtd-theme>=2.0",
    "myst-parser>=2.0",
    "sphinx-copybutton>=0.5",
]
typecheck = ["mypy>=1.13"]
all = ["macroforecast[tuning,shap,lime,xgboost,lightgbm,catboost,parquet,deep,mars,arch,anatomy]"]
ci = ["pytest>=8.0", "macroforecast[tuning,shap,lime,xgboost,lightgbm,catboost,parquet,arch,anatomy]"]
dev = ["pytest>=8.0", "macroforecast[all]"]

[project.scripts]
macroforecast = "macroforecast.scaffold.cli:main"

[tool.setuptools.packages.find]
include = ["macroforecast*"]

[tool.setuptools.package-data]
"macroforecast._vendor.macro_random_forest" = ["LICENSE", "PATCHES.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "deep: tests that require torch (skipped unless [deep] extra is installed)",
    "slow: realistic-shape integration tests (gated; opt in with `pytest -m slow`)",
]

[tool.mypy]
python_version = "3.10"
files = ["macroforecast"]
ignore_missing_imports = true
follow_imports = "skip"
show_error_codes = true
pretty = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = [
    "macroforecast.core.cache",
    "macroforecast.core.layers.l0",
    "macroforecast.core.layers.l1",
    "macroforecast.core.layers.l2",
    "macroforecast.core.layers.l3",
    "macroforecast.core.layers.l3_5",
    "macroforecast.core.layers.l4_5",
    "macroforecast.core.layers.l5",
    "macroforecast.core.layers.l6",
    "macroforecast.core.layers.l7",
    "macroforecast.core.layers.l8",
    "macroforecast.core.manifest",
    "macroforecast.core.ops.diagnostic_ops",
    "macroforecast.core.ops.l3_ops",
    "macroforecast.core.ops.l7_ops",
    "macroforecast.core.ops.l8_ops",
    "macroforecast.core.ops.universal",
    "macroforecast.core.runtime",
    "macroforecast.defaults",
    "macroforecast.raw.datasets.fred_md",
    "macroforecast.raw.manager",
    "macroforecast.recipes.paper_methods",
    "macroforecast.scaffold.builder",
    "macroforecast.scaffold.option_docs.l5",
    "macroforecast.scaffold.templates",
    "macroforecast.tuning.engine",
    "macroforecast.tuning.search.genetic",
    "macroforecast.tuning.search.grid",
    "macroforecast.tuning.search.random",
    "macroforecast.tuning.types",
]
ignore_errors = true
