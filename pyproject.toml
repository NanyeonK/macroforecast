[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "macrocast"
version = "0.5.2"
description = "Fair, reproducible macro forecasting benchmarking package"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "pandas>=2.2",
    "numpy>=2.0",
    "scikit-learn>=1.5",
    "statsmodels>=0.14",
    "PyYAML>=6.0",
    "scipy>=1.11",
    "matplotlib>=3.7",
]

[project.optional-dependencies]
tuning = ["optuna>=3.0"]
shap = ["shap>=0.47"]
lime = ["lime>=0.2"]
xgboost = ["xgboost>=3.0,<3.1"]
lightgbm = ["lightgbm>=4.0"]
catboost = ["catboost>=1.2"]
excel = ["openpyxl>=3.1"]
parquet = ["pyarrow>=14.0"]
deep = ["torch>=2.0"]
docs = [
    "sphinx>=7.0",
    "sphinx-rtd-theme>=2.0",
    "myst-parser>=2.0",
    "sphinx-copybutton>=0.5",
]
all = ["macrocast[tuning,shap,lime,xgboost,lightgbm,catboost,excel,parquet,deep]"]
dev = ["pytest>=8.0", "macrocast[all]"]

[project.scripts]
macrocast = "macrocast.scaffold.cli:main"

[tool.setuptools.packages.find]
include = ["macrocast*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "deep: tests that require torch (skipped unless [deep] extra is installed)",
    "slow: realistic-shape integration tests (gated; opt in with `pytest -m slow`)",
]
