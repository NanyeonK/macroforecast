<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>macrocast Navigator</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">macrocast</p>
        <h1>Layer Workbench</h1>
      </div>
      <nav class="top-actions" aria-label="Documentation links">
        <a href="../index.html">Docs</a>
        <a href="../navigator/index.html">Navigator Guide</a>
      </nav>
    </header>

    <main class="workbench">
      <aside class="panel layer-sidebar" aria-label="Canonical pipeline">
        <div class="sidebar-heading">
          <p class="eyebrow">Canonical DAG</p>
          <h2>L0-L8 Pipeline</h2>
          <p class="source-note">Select a layer to inspect sinks, sub-layers, axes, and UI mode.</p>
        </div>
        <section id="layer-topology" class="layer-topology" aria-label="Layer DAG topology"></section>
      </aside>

      <section class="workspace" aria-label="Layer workspace">
        <section id="layer-detail" class="panel layer-detail" aria-label="Canonical layer detail"></section>
      </section>

      <aside class="inspector" aria-label="Recipe inspector">
        <section class="recipe-controls-hidden" aria-hidden="true">
          <label for="sample-select">Starting recipe</label>
          <select id="sample-select"></select>
          <p id="path-source" class="source-note">sample: -</p>
          <div class="action-row">
            <button id="reset-path" type="button" class="secondary-action">Reset</button>
            <button id="import-yaml" type="button" class="secondary-action">Import YAML</button>
            <input id="import-yaml-input" type="file" accept=".yaml,.yml,text/yaml,text/plain" hidden />
          </div>
        </section>

        <section class="panel yaml-panel">
          <div class="section-heading compact">
            <div>
              <p class="eyebrow">Resolved recipe</p>
              <h2>YAML Preview</h2>
            </div>
            <div class="action-row">
              <button id="copy-yaml" type="button">Copy</button>
              <button id="download-yaml" type="button">Download</button>
            </div>
          </div>
          <pre id="yaml-preview" class="code-block"></pre>
        </section>
      </aside>
    </main>

    <script src="assets/state_engine.js?v=20260501-canonical-sublayers"></script>
    <script src="assets/app.js?v=20260501-canonical-sublayers"></script>
  </body>
</html>
